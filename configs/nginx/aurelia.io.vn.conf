# Aurelia — Nginx reverse proxy for aurelia.io.vn
#
# DNS (tại nhà cung cấp domain):
#   A    aurelia.io.vn        → <IP_VPS>
#   A    www.aurelia.io.vn    → <IP_VPS>
#   A    livekit.aurelia.io.vn → <IP_VPS>
#
# Cài trên VPS (host, ngoài Docker):
#   sudo cp configs/nginx/aurelia.io.vn.conf /etc/nginx/sites-available/aurelia.io.vn
#   sudo ln -sf /etc/nginx/sites-available/aurelia.io.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d aurelia.io.vn -d www.aurelia.io.vn -d livekit.aurelia.io.vn
#
# Stack Docker dùng network_mode: host — proxy về localhost:8080 / :7880

# ── Web (Next.js frontend) ───────────────────────────────────────────────────
server {
    listen 80;
    server_name aurelia.io.vn www.aurelia.io.vn;

    client_max_body_size 2g;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# ── LiveKit (WebSocket — phỏng vấn voice) ────────────────────────────────────
server {
    listen 80;
    server_name livekit.aurelia.io.vn;

    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}