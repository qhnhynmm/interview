# Aurelia dev stack — PostgreSQL + FastAPI backend (chạy toàn bộ trong Docker).
#
# Linux: dùng network_mode: host để API (8000) và DB (5432) lộ thẳng ra localhost,
# tránh lỗi Docker port-forward gây "NetworkError" trên Swagger/browser.
#
# Usage:
#   docker compose up -d --build
#   curl http://localhost:8000/health
#
# Dừng:
#   docker compose down        # giữ data
#   docker compose down -v     # xóa volume PostgreSQL
#
# Frontend (terminal riêng):
#   cd frontend && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: aurelia-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurelia}
      POSTGRES_DB: ${POSTGRES_DB:-aurelia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurelia} -d ${POSTGRES_DB:-aurelia}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    container_name: aurelia-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aurelia}:${POSTGRES_PASSWORD:-aurelia}@127.0.0.1:5432/${POSTGRES_DB:-aurelia}

volumes:
  postgres_data: