# Aurelia — Nginx trên AWS EC2 (Ubuntu).
# Thay YOUR_DOMAIN bằng domain thật, hoặc dùng block "ip-only" bên dưới.
#
# Cài:
#   sudo cp configs/nginx/aurelia.aws.conf /etc/nginx/sites-available/aurelia
#   sudo ln -sf /etc/nginx/sites-available/aurelia /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ── IP-only (không domain) — truy cập http://<EC2_PUBLIC_IP> ────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 2g;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

