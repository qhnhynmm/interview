# Backend service configuration (non-secret defaults).
#
# Loaded by app/config.py and overlaid by environment variables (.env).
# NEVER put secrets here.

backend:
  app_name: "Aurelia Backend"
  app_env: "development"
  api_prefix: "/api/v1"

  # CORS_ORIGINS is env-only (comma-separated). Never use "*" in production.
  db_echo: false

  ai_service_url: "http://localhost:8001"
  planning_endpoint: "/api/v1/planning/plan"
  assignment_endpoint: "/api/v1/assignment/generate"
  coding_assistant_endpoint: "/api/v1/coding-assistant/chat"
  inspector_endpoint: "/api/v1/inspector/evaluate"
  ai_request_timeout: 120.0

  livekit_url: "ws://localhost:7880"
  livekit_public_url: "ws://127.0.0.1:7880"
  livekit_token_ttl: 14400
  livekit_agent_name: "interview-agent"
  frontend_url: "http://localhost:8080"

  schedule_offset_minutes: 30
  max_concurrent_sessions: 3
  session_window_minutes: 18
  slot_open_buffer_minutes: 10

  storage_dir: "data/storage"

  minio_endpoint: "127.0.0.1:9000"
  minio_secure: false
  minio_region: "us-east-1"
  minio_bucket_cvs: "cvs"
  minio_bucket_recordings: "recordings"
  minio_bucket_reports: "reports"

  gemini_model: "gemini-3.1-flash-lite"
  gemini_request_timeout: 60.0

  jwt_algorithm: "HS256"
  jwt_expire_minutes: 1440