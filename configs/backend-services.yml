# Backend service configuration (non-secret defaults).
#
# These values are loaded by app/config.py and overlaid by environment
# variables (and .env). NEVER put secrets here — use environment variables.
# Each key below maps to a field on the Settings model (case-insensitive).

backend:
  app_name: "GreenTemis Backend"
  app_env: "development"
  api_prefix: "/api/v1"
  host: "0.0.0.0"
  port: 8000

  # Comma-separated CORS origins, or "*".
  cors_origins: "*"

  # SQL echo (debug). The DATABASE_URL itself is a secret -> env only.
  db_echo: false

  # Planning agent (ai-services). Backend POSTs here; on failure it falls back
  # to a built-in mock plan until the real Planning Agent exists.
  ai_service_url: "http://localhost:8001"
  planning_endpoint: "/api/v1/planning/plan"
  assignment_endpoint: "/api/v1/assignment/generate"
  coding_assistant_endpoint: "/api/v1/coding-assistant/chat"
  # Inspector (Judge) agent — chấm điểm + sinh report PDF khi /end.
  inspector_endpoint: "/api/v1/inspector/evaluate"
  # Assignment generation is the slowest AI call, so keep the global timeout wide.
  ai_request_timeout: 120.0

  # LiveKit interview rooms. NOTE: livekit_api_key / livekit_api_secret are
  # secrets and are read from env ONLY (never put them here).
  livekit_url: "ws://localhost:7880"
  livekit_public_url: "ws://localhost:7880"
  livekit_token_ttl: 14400
  livekit_agent_name: "interview-agent"
  frontend_url: "http://localhost:5173"

  # Schedule freshly generated interviews this many minutes in the future
  # (used when no explicit scheduled_at is requested).
  schedule_offset_minutes: 30

  # Slot / concurrency limits.
  # max_concurrent_sessions: hard cap on simultaneous live interview sessions.
  # session_window_minutes: how long each session occupies a slot (15 min + 3 grace).
  # slot_open_buffer_minutes: how many minutes before scheduled_at the link becomes joinable.
  max_concurrent_sessions: 3
  session_window_minutes: 18
  slot_open_buffer_minutes: 10

  # Relative paths are resolved against the repo root.
  storage_dir: "data/storage"

  # Object storage — boto3 S3-compatible (MinIO for dev, vStorage for prod).
  # Active values come from .env.dev or .env.prod (selected by DEPLOY_ENV).
  # These yaml defaults apply only when the env file does not set the variable.
  minio_endpoint: "minio:9000"
  minio_public_endpoint: "localhost:9000"
  minio_secure: false
  minio_region: "us-east-1"
  minio_bucket_cvs: "cvs"
  minio_bucket_recordings: "recordings"
  minio_bucket_reports: "reports"
  recording_url_ttl: 604800

  # JWT auth. jwt_secret is a secret -> env only (JWT_SECRET).
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 1440

  # ClickHouse — system/runtime logs. Secrets -> env file only.
  clickhouse_port: 8123
  clickhouse_host: "clickhouse"
  clickhouse_db: "greentemis_logs"
