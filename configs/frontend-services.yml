# Frontend development configuration.
#
# Read by vite.config.js at dev-server startup. All values here are
# non-secret defaults — never put API keys or credentials here.

frontend:
  dev_port: 3000

  # Backend API proxy target (used by Vite dev server so the browser never
  # hits the backend directly and avoids CORS issues during development).
  backend_url: "http://localhost:8000"

# ========== PROCTORING ==========
# Anti-cheat detection settings for the interview session.

proctoring:
  # ── Timing constants ───────────────────────────────────────────────────────
  # Ignore focus blips shorter than this (ms)
  flicker_ms: 50
  # A bare window blur (OS popup, Bluetooth / audio-device-switch dialog, system
  # notification) steals focus briefly without the candidate leaving. Wait this
  # long and re-verify focus before counting a blur as a tab switch (ms).
  blur_grace_ms: 1200
  # Re-check intervals while violation persists (ms)
  monitor_repeat_ms: 8000
  gaze_repeat_ms: 5000
  tab_repeat_ms: 3000
  face_repeat_ms: 400
  phone_repeat_ms: 250
  # Grace windows to bridge dropped frames (ms)
  multi_grace_ms: 700
  phone_grace_ms: 500

  # ── Detection enable/disable ─────────────────────────────────────────────
  enable_gaze: true
  enable_multi_face: true
  enable_phone: true

  # ── Gaze detection ───────────────────────────────────────────────────────
  # Time looking away before reporting violation (ms) - detect after 3-5 seconds
  gaze_threshold_ms: 3000
  # Detection check interval (ms)
  gaze_interval_ms: 250
  # Eye gaze direction thresholds (0-1)
  eye_look_h_threshold: 0.72
  eye_look_v_threshold: 0.8

  # ── Multi-face detection ─────────────────────────────────────────────────
  # Time a second face must stay in frame before reporting (ms). Raised from a
  # near-instant 100ms — that flagged momentary mis-detections (reflections,
  # motion blur, posters) as a second person, causing heavy false positives.
  # A real helper stays in frame for seconds, so require sustained presence.
  multi_face_threshold_ms: 2500
  # Minimum confidence (0-1) for a detected face to count. MediaPipe defaults to
  # 0.5, which lets low-confidence blobs register as a second face; raise it so
  # only clear faces trigger the multi-face signal.
  min_face_detection_confidence: 0.78
  # Minimum width of a second face, as a fraction of the frame (0-1), for it to
  # count as a real person. Filters out small background faces (posters, photos,
  # reflections) — the main multi-face false-positive source. 0 disables it.
  multi_face_min_size_ratio: 0.12

  # ── Phone detection ───────────────────────────────────────────────────────
  # Time phone stays in frame before reporting (ms)
  phone_threshold_ms: 500
  # Detection check interval (ms)
  phone_interval_ms: 400
  # Minimum confidence score (0-1) — keep high to avoid ears/hands and small
  # dark phone-shaped objects (wallets, cards, remotes) being misclassified.
  phone_score_threshold: 0.5

  # ── MediaPipe models ──────────────────────────────────────────────────────
  medipipe_version: "0.10.18"
  # Base URL for MediaPipe WASM files
  wasm_base: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision"
  # Face landmarker model
  face_model_url: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
  # Object detector model (for phone detection). Lite2 (448px input) is more
  # accurate than Lite0 (320px) — catches smaller / angled / partially-occluded
  # phones — at a modest speed cost, still realtime.
  object_model_url: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite2/float16/1/efficientdet_lite2.tflite"
