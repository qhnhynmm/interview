# Tạm tắt — dùng localhost khi dev. Bật lại khi deploy production.
# Tham khảo: configs/nginx/aurelia.io.vn.conf, scripts/setup-nginx-aurelia.sh
#
# Public domain for Aurelia production (aurelia.io.vn).
# Used as reference — runtime values come from repo-root .env.
#
# domain:
#   site: aurelia.io.vn
#   www: www.aurelia.io.vn
#   livekit_host: livekit.aurelia.io.vn
#
#   frontend_url: https://aurelia.io.vn
#   livekit_public_url: wss://livekit.aurelia.io.vn
#   # Internal (Docker host network — do not expose publicly)
#   backend_proxy_url: http://127.0.0.1:8000
#   livekit_internal_url: ws://127.0.0.1:7880
#
#   # DNS — Mat Bao (ns1.matbao.vn). Chưa có A record (kiểm tra 2026-06-29).
#   # Outbound IP máy dev (có thể là proxy mạng công ty): 101.99.62.90
#   dns_records:
#     - { type: A, name: "@", target: "101.99.62.90" }
#     - { type: A, name: "www", target: "101.99.62.90" }
#     - { type: A, name: "livekit", target: "101.99.62.90" }
#   nameservers:
#     - ns1.matbao.vn
#     - ns2.matbao.vn

# Local dev defaults (active)
domain:
  frontend_url: http://localhost:8080
  livekit_public_url: ws://127.0.0.1:7880
  backend_proxy_url: http://127.0.0.1:8000
  livekit_internal_url: ws://127.0.0.1:7880