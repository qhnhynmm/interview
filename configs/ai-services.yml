# AI-services configuration (non-secret defaults).
#
# Loaded by ai-services/app/config.py. Secrets stay in repo-root .env.

ai-services:
  app_env: "development"
  backend_url: "http://localhost:8000"

  mcp_host: "0.0.0.0"
  mcp_port: 8001

  llm_provider: "gemini"
  gemini_base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  gemini_model: "gemini-3.1-flash-lite"
  # OPENAI_BASE_URL — set in .env for MaaS / OpenAI-compatible gateways (never commit URLs with creds).
  planning_model: "gemini-3.1-flash-lite"
  planning_temperature: 0.4
  planning_max_tokens: 1536
  planning_request_timeout: 75
  planning_analyst_model: ""
  planning_analyst_max_tokens: 1100

  assignment_model: "gemini-3.1-flash-lite"

  coding_assistant_model: "google/gemma-4-31b-it"
  coding_assistant_temperature: 0.3
  coding_assistant_max_tokens: 2048

  inspector_model: "google/gemma-4-31b-it"
  inspector_temperature: 0.3
  inspector_max_tokens: 4096

  otel_enabled: true
  otel_otlp_endpoint: "http://localhost:6006/v1/traces"
  otel_console: false
  otel_sensitive: true

interview-agent:
  livekit_url: "ws://localhost:7880"
  agent_name: "interview-agent"
  language: "en"

  mcp_sse_url: "http://localhost:8001/mcp/sse"
  mcp_assignment_sse_url: "http://localhost:8001/assignment-mcp/sse"
  mcp_http_timeout: 20
  backend_url: "http://localhost:8000"

  # Gemini Live API (native audio). Requires GEMINI_API_KEY in .env.
  live_model: "gemini-2.5-flash-native-audio-preview-12-2025"
  live_voice: "Puck"
  interview_temperature: 0.5
  interview_max_tokens: 1000

  # Fallback LLM for MCP code-analysis tools (non-voice). Base URL via INTERVIEW_OPENAI_BASE_URL in .env.
  openai_model: "minimax/minimax-m2.5"

  silence_threshold_ms: 1500

  proctoring_cooldown_seconds: 5
  proctoring_max_violations: 5