# Aurelia dev stack — PostgreSQL + FastAPI backend (chạy toàn bộ trong Docker).
#
# Linux: dùng network_mode: host để API (8000) và DB (5432) lộ thẳng ra localhost,
# tránh lỗi Docker port-forward gây "NetworkError" trên Swagger/browser.
#
# Usage:
#   docker compose up -d --build
#   curl http://localhost:8000/health
#
# Dừng:
#   docker compose down        # giữ data
#   docker compose down -v     # xóa volume PostgreSQL
#
# Frontend (terminal riêng) — Now Next.js:
#   cd frontend && npm run dev
# Default dev port for Next.js is 3000 (update FRONTEND_URL if you change it)
#
# MinIO Console: http://localhost:9001 (user/pass = MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
#
# AI Services (Planning Agent — tùy chọn):
#   docker compose up -d ai-services
#   curl http://localhost:8001/health
#
# Agent tracing (Arize Phoenix):
#   docker compose up -d phoenix
#   UI: http://localhost:6006

services:
  minio:
    image: minio/minio:latest
    container_name: aurelia-minio
    restart: unless-stopped
    network_mode: host
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aurelia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aurelia-secret}
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: aurelia-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurelia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurelia}
      POSTGRES_DB: ${POSTGRES_DB:-aurelia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurelia} -d ${POSTGRES_DB:-aurelia}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    container_name: aurelia-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aurelia}:${POSTGRES_PASSWORD:-aurelia}@127.0.0.1:5432/${POSTGRES_DB:-aurelia}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ENABLED: "true"
      MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aurelia}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aurelia-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:8001}

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: aurelia-phoenix
    restart: unless-stopped
    network_mode: host

  ai-services:
    build:
      context: .
      dockerfile: ai-services/Dockerfile.api
      network: host
    container_name: aurelia-ai-services
    restart: unless-stopped
    network_mode: host
    depends_on:
      phoenix:
        condition: service_started
    environment:
      BACKEND_URL: http://127.0.0.1:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OTEL_ENABLED: "true"
      OTEL_OTLP_ENDPOINT: http://127.0.0.1:6006/v1/traces
      OTEL_SENSITIVE: "true"

volumes:
  postgres_data:
  minio_data: